<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HotPaste — блискавичний менеджер сніпетів з клавіатурною навігацією. Копіюй промти за 2 натискання клавіш." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f0f14" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Arsenal:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>HotPaste — Менеджер сніпетів</title>
  </head>
  <body>
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('hotpaste_hp_theme');      
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          let theme = saved ? JSON.parse(saved) : (prefersDark ? 'dark-gray' : 'light-gray');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
      if (window.__TAURI__) {
        document.documentElement.classList.add('is-tauri');
      }
    </script>
    <div id="app"></div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
